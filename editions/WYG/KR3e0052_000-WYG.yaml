body:
  text: 内外傷寒辨惑論醫家類提要臣等謹案内外傷寒辨惑論三卷金李杲撰杲字明之自號東垣老人真定人嘗以納貲得官監濟源税案元硯堅作東垣老人𫝊稱杲以辛亥年卒年七十二則當生于世宗大定二十年庚子金亡時年五十五入元十七年乃終故舊本亦或題元人而元史亦載入方技𫝊也初杲母嬰疾為衆醫襍治而死訖莫知為何證杲自傷不知醫理遂捐千金從易州張元素學盡得其法而名乃出於元素上卓為醫家大宗是編發明内傷之症有類外感辨别隂陽寒熱有餘不足而大㫖總以脾胃為主故特製補中益氣湯專治飲食勞倦虛人感冒法取補土生金升清降濁得隂陽生化之㫖其闡發醫理至為深㣲前有自序題丁未嵗序中稱此論束之髙閣十六年以長歴推之其書葢出於金哀宗之正大九年辛夘也乾隆四十三年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀内外傷辯惑論原序僕㓜自受難素扵易水張元素先生講誦既乆稍有所得中年以来更事頗多諸所診治坦然不惑曽撰内外傷辯惑論一篇以證世人用藥之悞陵谷變遷忽成老境神志既惰懶扵語言此論束之髙閣十六年矣崑崙范尊師曲相奨借屢以活人為言謂此書果行使天下之人不致夭折是亦仁人君子濟人利物之事就令著述不已精力衰耗書成而死不愈扵無益而生乎予敬受其言僅力疾成之雖未為完備聊荅尊師慈憫之志師宋文正公之後也丁未嵗重九日東垣老人李杲明之序
