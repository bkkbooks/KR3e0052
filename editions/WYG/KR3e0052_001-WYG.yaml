body:
  text: 内外傷辯惑論卷上元李杲撰辯隂證陽證曰甚哉隂陽之證不可不詳也徧觀内經中所説變化百病其源皆由喜怒過度飲食失節寒温不適勞役所傷而然夫元氣糓氣榮氣淸氣衛氣生發諸陽上升之氣此六者皆飲食入胃穀氣上行胃氣之異名其實一也既脾胃冇傷則中氣不足中氣不足則六腑陽氣皆絶於外故經言五臟之氣已絶於外者是六腑之元氣病也氣傷臟乃病臟病則形乃應是五臟六腑真氣皆不足也惟隂火獨旺上乗陽分故榮衛失守諸病生焉其中變化皆由中氣不足乃能生發耳後有脾胃以受勞役之疾飲食又復失節耽病日乆事息心安飽食太甚病乃大作槩其外傷風寒六滛客邪皆有餘之病當瀉不當補飲食失節中氣不足之病當補不當瀉舉世醫者皆以飲食失節勞役所傷中氣不足當補之證認作外感風寒有餘客邪之病重瀉其表使榮衛之氣外絶其死只在旬日之間所謂差之毫釐謬以千里可不詳辯乎按隂陽應象論云天之邪氣感則害人五臟是八益之邪乃風邪傷人筋骨風從上受之風傷筋寒傷骨盖有形質之物受病也繫在下焦肝腎是也肝腎者地之氣難經解云肝腎之氣已絶於内以其肝主筋腎主骨故風邪感則筋骨疼痛筋骨之絶則腎肝之本亦絶矣乃有餘之證也及云水穀之寒熱感則害人六腑是七損之病乃内傷飲食也黄帝鍼經解云適飲食不節勞役所傷濕從下受之謂脾胃之氣不足而反下行極則衝脉之火逆而上是無形質之元氣受病也繫在上焦心肺是也心肺者天之氣故難經解云心肺之氣已絶於外以其心主榮肺主衛榮者血也脉者血之腑神之所居也衛者元氣七神之别名衛護周身在於皮毛之間也肺絶故皮毛先絶神無所依故内傷飲食則亦惡風寒是榮衛失守皮膚間無陽以滋養不能任風寒也皮毛之絶則心肺之本亦絶矣盖胃氣不升元氣不至無以滋養心肺乃不足之證也計受病不一飲食失節勞役所傷因而飽食内傷者極多外傷者間而有之世俗不知徃徃將元氣不足之證便作外傷風寒表實之證而反治心肺是重絶其表也安得不死乎古人所謂實實虚虚醫殺之耳若曰不然請以衆人之耳聞目見者證之向者壬辰改元京師戒嚴迨三月下旬受敵者凡半月解圍之後都人之不受病者萬無一二既病而死者繼踵而不絶都門十有二所每日各門所送多者二千少者不下一千似此者幾三月此百萬人豈俱感風寒外傷者耶大抵人在圍城中飲食不節乃勞役所傷不待言而知由其朝飢暮飽起居不時寒温失所動經三兩月胃氣虧之乆矣一旦飽食太過感而傷人而又調治失宜其死也無疑矣非惟大梁為然逺在真祐興定間如東平如太原如鳯翔解圍之後病傷而死無不然者余在大梁凡所親見有表發者有以巴豆推之者有以承氣湯下之者俄而變結胷發黄又以䧟胷湯丸及茵陳湯下之無不死者盖初非傷寒以調治差悞變而似真傷寒之證皆藥之罪也徃者不可追來者猶可及輒以平生已試之效著内外傷辯論一篇推明前哲之餘論厯舉近世之變故庶幾同志者審其或中觸類而長之免後人之横夭耳僣易之罪將何所逃乎辯脉古人以脉上辯内外傷於人迎氣口人迎脉大於氣口為外傷氣口脉大於人迎為内傷此辯固是但其説有所未盡耳外感風寒皆有餘之證是從前客邪來也其病必見於左手左手主表乃行陽二十五度内傷飲食及飲食不節勞役所傷皆不足之病也必見於右手右手主裏乃行隂二十五度故外感寒邪則獨左寸人迎脉浮𦂳按之洪大𦂳者後甚於弦是足太陽寒水之脉按之洪大而有力中見手少隂心火之脉丁與壬合内顯洪大乃傷寒脉也若外感風邪則人迎脉緩而大於氣口一倍或兩倍三倍内傷飲食則右寸氣口脉大於人迎一倍傷之重者過在少隂則兩倍太隂則三倍此内傷飲食之脉若飲食不節勞役過甚則心脉變見於氣口是心火刑肺其肝木挾心火之勢亦來薄肺經云侮所不勝寡於畏者是也故氣口脉急大而澀數時一代而澀也澀者脉之本脉大者元氣不相接脾胃不及之脉洪大而數者心脉刑肺也急者肝木挾心火而反尅肺金也若不甚勞役惟右關脾脉大而數謂獨大於五脉數中顯緩時一代也如飲食不節寒温失所則先右關胃脉損弱甚則隠而不見惟内顯脾脉之大數微緩時宿食不消則獨右關脉沉而滑經云脉滑者有宿食也以此辯之豈不明白易見乎但恐山野間卒無醫者何以診候故復説病證以辯之辯寒熱内傷寒邪之證與飲食失節勞役形質之病及内傷飲食俱有寒熱舉世將盡内傷飲食失節勞役不足之病作外傷寒邪表實有餘之證反瀉其表枉死者豈勝言哉皆由不别其寒熱耳今細為分解之外傷寒邪發熱惡寒寒熱併作其熱也翕翕發熱又為之拂拂發熱發於皮毛之上如羽毛之拂明其熱在表也是寒邪犯髙之髙者也皮膚毛腠者陽之分也是衛之元氣所滋養之方也以寒邪乗之鬱遏陽分陽不得伸故發熱也其面赤鼻氣壅塞不通心中煩悶稍似袒祼露其皮膚已不能禁其寒矣其表上虚熱止此而已其惡寒也維重衣下幕逼近烈火終不能禦其寒一時一日增加愈甚必待傳入裏作下證乃罷其寒熱齊作無有間斷也其内傷飲食不節或勞役所傷亦有頭痛項强腰痛與太陽表證微有相似餘皆不同論中辯之矣内傷不足之病表上無陽不能禁風寒也此則常常有之其燥熱發於腎間者間而有之與外中寒邪畧不相似其惡風寒也盖脾胃不足榮氣下流而乗腎肝此痰厥氣逆之漸也若胃氣平常飲食入胃其榮氣上行以舒於心肺以滋養上焦之皮膚腠理之元氣也既下流其心肺無所禀受皮膚間無虧失其榮衛之外護故陽分皮毛之間虚弱但見風見寒或居隂寒處無日陽處便惡之也此常常有之無間斷者也但避風寒及温煖處或添衣盖温養其皮膚所惡風寒便不見矣是熱也非表傷寒邪皮毛間發熱也乃腎間受脾胃下流之濕氣間塞其下致隂火上衝作蒸蒸而燥熱上徹頭頂傍徹皮毛渾身燥熱作須待袒衣露居近寒涼處即已或熱極而汗出而亦解彼外傷惡寒發熱豈有汗出者乎若得汗則病愈矣以此辯之豈不如黑白之易見乎當内虚而傷之者燥熱也或因口吸風寒之氣鬱其隂火使咽膈不通其吸入之氣欲入為膈上衝脉之火所拒使隂氣不得入其胷中之氣為外風寒所遏而不得伸令人口開目瞪極則聲發於外氣不能上下塞於咽中而氣欲絶又或因噦因嘔因吐而燥熱發必有所因方有此證其表虚惡風寒之證復見矣表虚之弱為隂火所乗燥發須臾而過其表虚無陽不任風寒復見矣是表虚無陽常常有之其燥熱則間而有之此二者不齊燥作寒已寒作燥已非如外傷之寒熱齊作無有間斷也百病俱有身熱又謂之肌熱又謂之皮膚間熱以手捫之方知者是也乃肌體有形之熱也亦須皆待隂陽既和汗出則愈矣慎不可於此上辯之以其虚實内外病皆有之故難辯耳只依先説病人自覺發熱惡寒之熱及燥作之熱上辯之為准則矣辯外感八風之邪或有飲食勞役所傷之重者三二日間特與外傷者相似其餘證有特異名者若不將兩證重别分解猶恐將内傷不足之證誤作有餘外感風邪雖辭理有重復處但欲病者易辯醫者易治耳外感八風之邪乃有餘證也内傷飲食不節勞役所傷皆不足之病也其内傷亦惡風自汗若在温煖無風處則不惡矣與外傷鼻流涕頭痛自汗頗相似細分之則異耳外感風邪其惡風自汗頭痛鼻流清涕常常有之一日一時增加愈甚直至傳入裏作下證乃罷語聲重濁髙厲有力鼻息壅塞而不通能食腹中和口知味大小便如常筋骨疼痛不能動摇便著牀枕非扶不起其内傷與飲食不節勞役所傷然亦惡風居露地中遇大漫風起却不惡也惟門忩隙中些小賊風來必大惡也與傷風傷寒俱不同矣况鼻流清涕頭痛自汗間而有之鼻中氣短少氣不足以息語則氣短而怯弱妨食或食不下或不欲食三者互有之腹中不和或腹中急而不能伸口不知五榖之味小便頻數而不渇初勞役得病食少小便赤黄大便常難或澀或結或虚坐只見些小白膿時有下氣或泄黄如糜或溏泄色白或結而不通若心下痞或胷中閉塞如刀劚之痛二者亦互作不併出也有時胃脘當心而痛上肢兩脇痛必臍下相火之勢如巨川之水不可遏而上行使陽明之經逆行亂於胷中其氣無止息甚則髙喘熱傷元氣令四肢不收無氣以動而懶倦嗜卧以其外感風寒俱無此證故易為分辯耳辯手心手背内傷及勞役飲食不節病手心熱手背不熱外傷風寒則手背熱手心不熱此辯實甚皎然辯口鼻若飲食勞役所傷其外證在口必口失榖味必腹中不和必不欲言縱勉强對荅聲必怯弱口沃沫多唾鼻中清涕或有或無即隂證也外傷風寒則其外證必顯在鼻鼻氣不利聲重濁不清利其言壅塞氣盛有力而口中必和傷寒則面赤鼻壅塞而乾傷風則鼻流淸涕而已内經云鼻者肺之候肺氣通於天外傷風寒則鼻為之不利口者坤土也脾氣通於口飲食失節勞役所傷口不知穀味亦不知五味又云傷食惡食傷食明矣辯氣少氣盛外傷風寒者故其氣壅盛而有餘内傷飲食勞役者其口鼻中皆氣短促不足以息何以分之盖外傷風寒者心肺元氣初無減損又添邪氣助之使鼻氣壅塞不利面赤不通其鼻中氣不能出併從口出但發一言必前輕而後重其言髙其聲壯厲而有力是傷寒則鼻乾無涕面壅色赤其言前輕後重其聲壯厲而有力者乃有餘之驗也傷風則決然鼻流清涕其聲嗄其言響如從瓮中出亦前輕而後重髙掲而有力皆氣盛有餘之驗也内傷飲食勞役者心肺之氣先損為熱所傷熱既傷氣四肢無力以動故口鼻中皆短氣少氣上喘懶語人有所問十不欲對其一縱勉强荅之其氣亦怯其聲亦低是其氣短少不足之驗也明白如此雖婦人女子亦能辯之豈有醫者反不能辯之乎辯頭痛内證頭痛有時而作有時而止外證頭痛常常有之直須傳入裏實方罷此又内外證之不同者也辯骨筋四肢内傷等病是心肺之氣已絶於外必怠惰嗜卧四肢沈困不收此乃熱傷元氣脾主四肢既為熱所乗無氣以動經云熱傷氣又云熱則骨消筋緩此之謂也若外傷風寒是腎肝之氣已絶於内腎主骨為寒肝主筋為風自古腎肝之病同一治以其逓相維持也故經言膽主筋膀胱主骨是也或中風或傷寒得病之日便著牀枕非扶不起筋骨為之疼痛不能動摇乃形質之傷經云寒傷形又云寒則筋攣骨痛此之謂也辯外傷不惡食若勞役飲食失節寒温不適此三者皆惡食仲景傷寒論云中風能食傷寒不能食二者皆口中和而不惡食若勞役所傷及飲食失節寒温不適三者俱惡食口不知五味亦不知五穀之味只此一辯足以分内外有餘不足二證也傷寒證雖不能食而不惡食口中和知五味亦知穀味盖無内證則心氣和脾氣通知五穀之味矣辯渇與不渇外感風寒之邪三日已外穀消水去邪氣傳裏始有渇也内傷飲食失節勞役乆病者必不渇是邪氣在血脉中有餘故也初勞役形質飲食失節傷之重者必有渇以其心火熾上尅於肺金故渇也又當以此辯之雖渇欲飲冷水者當徐少與之不可縱意而飲恐水多峻下則胃氣愈弱輕則為脹重則傳變諸疾必反覆悶亂百脉不安夜加增劇不得安卧不可不預度也辯勞役受病表虚不作表實治之或因勞役動作腎間隂火沸騰事閑之際或於隂涼處解脱衣裳更有新沐浴於背隂處坐卧其隂火下行遷歸腎間皮膚腠理極虚無陽但風來為寒涼所遏表虚不任其風寒自認外感風寒求醫解表以重絶元氣取禍如反掌茍幸而免者致虚勞氣血皆弱不能完復且表虚之人為風寒所遏亦是虚邪犯表始病一二日之間時與外中賊邪有餘之證頗相似處故致疑惑請醫者只於氣少氣盛上辯之其外傷賊邪必語聲前輕後重髙厲而有力若是勞役所傷飲食不節表虚不足之病必短氣氣促上氣髙喘懶語其聲困弱而無力至易見也若毫釐之誤則千里之謬已上者辯證别有治法用藥正論故作此説分解于后辯證與中熱頗相似復有一等乗天氣大熱之時在於路途中勞役得之或在田野間勞形得之更或有身體薄弱食少勞役過甚又有修善當齋之人胃氣乆虚而因勞役得之者皆與陽明中熱白虎湯證相似必肌體捫摸之壯熱必燥熱悶亂大惡熱渇而飲水以勞役過甚之故亦身疼痛始受病之時特與中熱外得有餘之證脾胃大虚元氣不足口鼻中氣皆短促而上喘至日轉以後是陽明得時之際病必少減若是外中熱之病必到日晡之際大作讝語其熱增加大渇飲水煩悶不止其勞役不足者皆無此證尤易為分解若有難決疑似之證必當待一二日而求醫治療必不至錯誤矣飲食不節勞役形體所受病皆脾虚腠理元氣已絶也徃徃病人將自己表虚不任風寒但有風來寒至招認作傷風召醫以㵼其表及重虚其虚輕則致危困虚勞重則必死深可哀憫故特一説以祛醫者之誤内外傷辯惑論卷上
