body:
  text: 內外傷辨惑論卷中元李杲撰飲食勞倦論古之至人窮隂陽之造化究乎生死之際所著內經悉言人以胃氣為本蓋人受水穀之氣以生所謂清氣榮氣衛氣春升之氣皆胃氣之别稱也夫胃為水穀之海飲食入胃逰溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟隂陽揆度以為常也茍飲食失節寒溫不適則脾胃乃傷喜怒憂恐勞役過度而損耗元氣既脾胃虛衰元氣不足而心火獨盛心火者隂火也起於下焦其系繫於心心不主令相火代之相火下焦包絡之火元氣之賊也火與元氣不能兩立一勝則一負脾胃既虛則下流於腎肝隂火得以乘其土位故脾胃之證始得之則氣髙而喘身熱而煩其脉洪大而頭痛或渴不止皮膚不任風寒而生寒熱蓋隂火上衝則氣髙而喘身煩熱為頭痛為渴而脉洪大脾胃之氣下流使穀氣不得升浮是生長之令不行則無陽以護其榮衛不任風寒乃生寒熱皆脾胃之氣不足所致也然而與外感風寒所得之證頗同而理異內傷脾胃乃傷其氣外感風寒乃傷其形傷外為有餘有餘者瀉之傷內為不足不足者補之汗之下之吐之尅之皆瀉也溫之和之調之養之皆補也內傷不足之病茍誤認作外感有餘之病而反瀉之則虛其虛也難經云實實虛虛損不足而益有餘如此死者醫殺之耳然則奈何曰惟當以井溫之劑補其中升其陽井寒以瀉其火則愈內經曰勞者溫之損者溫之蓋溫能除大熱大忌苦寒之藥瀉胃土耳今立補中益氣湯補中益氣湯黃耆勞役病熱甚者二錢甘草炙已上各五分人參去蘆升麻柴胡橘皮當歸身酒洗白术已上各三分右件㕮咀都作一服水二盞煎至一盞去柤早飯後溫服如傷之重者二服而愈量輕重治之立方本指夫脾胃虛者因飲食勞倦心火亢甚而重耗土位其次肺氣受邪須用黃耆最多人參井草次之脾胃一虛肺氣先絶故用黃耆以益皮毛而閉腠理不令自汗上喘氣短損其元氣人參以補之心火乘脾炙井草用井溫以瀉火熱而補脾胃中元氣若脾胃急痛并大虛腹中急縮者宜多用之經云急者緩之白术苦井溫除胃中熱利腰臍間血胃中清氣在下必加升麻柴胡以引之引黃耆井草辛溫之氣味上升能補衛氣之散解而實其表也又緩帶脉之縮急二味苦平味之薄者隂中之陽引清氣上升也氣亂於胸中為清濁相干用去白陳皮以理之又能助陽氣上升以散滯氣助諸井辛為用也乾嗌者加乾葛脾胃氣虛不能升浮為隂火傷其生發之氣榮血大虧榮氣不營隂火熾盛是血中伏火日漸煎熬血氣日減心包與心主血血減則心無所養致使心亂而煩病名曰悗悗者心惑而煩悶不安也故加辛井微溫之劑生陽氣陽生則隂長或曰井溫何能生血曰仲景之法血虛以人參補之陽旺則能生隂血更以當歸和之少加黃蘗以救腎水能瀉隂中之伏火如煩猶不止少加生地黃補腎水水旺而心火自降如氣浮心亂以硃砂安神丸鎮固之則愈硃砂安神丸硃砂五錢另研井草五錢五分黃連去鬚淨酒洗六錢當歸去蘆二錢五分內經曰熱淫所勝治以井寒以苦瀉之以黃連之苦寒去心煩除濕熱為君以井草生地黃之井寒瀉火補氣滋生隂血為臣以當歸補其血不足硃砂納浮溜之火而安神明也右件除硃砂外四味共為細末湯浸蒸餅為丸如黍米大以硃砂為衣每服十五丸或二十丸津唾咽下食後或溫水涼水少許送下亦得此近而竒耦制之緩也四時用藥加減法內經曰胃為水榖之海又云腸胃為市無物不包無物不入寒熱溫涼皆有之其為病也不一故隨時證於補中益氣湯中權立四時加減法于后以手捫之而肌表熱者表熱也只服補中益氣湯一二服得微汗則已非正發汗乃隂陽氣和自然汗出也若更煩亂如腹中或周身有刺痛皆血澀不足加當歸身五分或一錢如精神短少加人參五分五味子二十箇頭痛加蔓荆子三分痛甚加川芎五分頂痛腦痛加藁本五分細辛三分諸痛併用此四味足矣如頭痛有痰沈重懶倦者乃太隂痰厥頭痛加半夏五分生薑三分耳鳴目黃頰頷腫頸肩臑肘臂外後亷痛面赤脉洪大者以羌活一錢防風藁本已上各七分井草五分通其經血加黃芩黃連已上各三分消其腫人參五分黃耆七分益元氣而瀉火邪另作一服與之嗌痛頷腫脉洪大而赤者加黃芩井草已上各三分桔梗七分口乾嗌乾者加葛根五分升引胃氣上行以潤之如夏月咳嗽者加五味子二十五箇麥門冬去心五分如冬月咳嗽加不去根節麻黃五分如秋涼亦加如春月天溫只加佛耳草欵冬花已上各五分若久病痰嗽肺中伏火去人參以防痰嗽增益耳食不下乃胸中胃上有寒或氣澀滯加青皮木香已上各三分此三味為定法如冬月加益智仁草豆䓻仁已上各五分如夏月少加黃芩黃連更加檳榔草豆䓻仁縮砂仁白豆䓻仁各五分如春初猶寒少加辛熱之劑以補春氣之不足為氣藥之佐益智草豆蔲可也心下痞夯悶者加芍藥黃連已上各一錢如痞腹脹加枳實木香縮砂仁已上各三分厚朴七分如天寒少加乾薑或中桂桂心也心下痞覺中寒加附子黃連已上各一錢不能食而心下痞加生薑陳皮已上各一錢能食而心下痞加黃連五分枳實三分脉緩有痰而痞加半夏黃連五分柴胡七分甘草三分腹中痛者加白芍藥五分井草三分如惡寒覺冷痛加中桂五分如夏月腹中痛不惡寒不惡熱者加黃芩井草已上各五分芍藥一錢以治時熱也腹痛在寒涼時加半夏益智草豆䓻之類如腹痛惡寒而脉弦者是木來尅土也小建中湯主之蓋芍藥味酸於土中瀉木為君如脉沈細腹中痛是水來侮土以理中湯主之乾薑辛熱於土中瀉水以為主也如脉緩體重節痛腹脹自利米穀不化是濕勝以平胃散主之蒼术苦辛溫瀉濕為主也脅下痛或脅下縮急俱加柴胡三分甚則五分井草三分臍下痛者加真熟地黃五分如不已者乃大寒也加內桂五分遍閲內經中悉言小腹痛皆寒非傷寒厥隂之證也乃下焦血結膀胱仲景以抵當湯并抵當丸主之小便遺失肺金虛也宜安卧養氣以黃耆人參之類補之不愈則是有熱也黃蘖生地黃已上各五分切禁勞役如卧而多驚小便淋溲者邪在少陽厥隂宜太陽經所加之藥更加柴胡五分如淋加澤瀉五分此下焦風寒合病也經云腎肝之病同一治為俱在下焦非風藥行經則不可乃受客邪之濕熱也宜升舉發散以除之大便祕澀加當歸一錢大黃酒洗煨五分或加一錢如有不大便者煎成正藥先用清者一口調𤣥明粉五分或一錢如大便行則止此病不宜大下之必變凶證也腳膝痿軟行步乏力或痛乃腎肝伏熱少加黃蘖五分空心服不已更加漢防已五分脉緩顯沈困怠惰無力者加蒼术澤瀉人參白术茯苓五味子已上各五分如風濕相摶一身盡痛以除風濕羌活湯主之除風濕羌活湯羌活七分防風升麻柴胡已上各五分藁本蒼术已上各一錢右件銼如麻豆大都作一服水二盞煎至一盞去柤大溫服之空心食前所以然者為風藥已能勝濕故另作一服與之肩背痛汗出小便數而少風熱乘肺肺氣鬱甚也當瀉風熱則愈通氣防風湯主之通聖防風湯防風羌活陳皮人參甘草各五分藁本青皮已上各三分白豆䓻黃蘖已上各二分升麻柴胡黃耆已上各一錢右㕮咀都作一服水二盞煎一盞去柤溫服食後如面白脫色氣短者不可服肩背痛不可回顧者此手太陽氣鬱而不行以風藥散之脊痛項强腰似折項似拔此足太陽經不通行以羌活勝濕湯主之羌活勝濕湯羌活獨活已上各一錢藁木防風井草炙川芎已上各五分蔓荆子三分右㕮咀都作一服水二盞煎至一盞去柤大溫服空心食前如身重腰沈沈然經中有寒濕也加酒洗漢防己五分輕者附子五分重者川烏五分升陽順氣湯治因飲食不節勞役所傷腹脅滿悶短氣遇春則口淡無味遇夏雖熱猶有惡寒飢則常如飽不喜食冷物黃耆一兩半夏三錢湯洗草豆蔲二錢神麯一錢五分炒升麻柴胡當歸身陳皮已上各一錢井草炙黃蘖已上各五分人參去蘆三分脾胃不足之證須用升麻柴胡苦平味之薄者隂中之陽引脾胃中淸氣行於陽道及諸經生發隂陽之氣以滋春氣之和也又引黃耆人參井草井溫之氣味上行充實腠理使陽氣得衛外而為固也凡治脾胃之藥多以升陽補氣名之者此也右件㕮咀每服三錢水二盞生薑三片煎至一盞去柤溫服食前升陽補氣湯治飲食不時飢飽勞役胃氣不足脾氣不溜氣短無力不時寒熱早飯後轉增昏悶須要眠睡怠惰四肢不收懶倦動作及五心煩熱厚朴薑製五分升麻羌活白芍藥獨活防風井草炙澤瀉已上各一錢生地黃一錢五分柴胡二錢五分右件為粗末每服五錢水二盞生薑二片棗二枚煎至一盞去柤大溫服食前如腹脹及窄狹加厚朴如腹中似硬加砂仁二分暑傷胃氣論刺志論云氣虛身熱得之傷暑熱傷氣故也痿論云有所逺行勞倦逢大熱而渴則陽氣內伐內伐則熱舍於腎腎者水臟也今水不能勝火則骨枯而髓虛足不任身發為骨痿故下經曰骨痿者生於大熱也此濕熱成痿令人骨乏無力故治痿獨取陽明時當長夏濕熱大勝蒸蒸而熾人感之多四肢困倦精神短少懶於動作胸滿氣促脉節沈疼或氣髙而喘身熱而煩心下膨痞小便黃而少大便溏而頻或痢出黃糜或如泔色或渴或不渴不思飲食自汗體重或汗少者血先病而氣不病也其脉中得洪緩若濕熱相摶必加之以遲遲病雖互換少差其天暑濕令則一也宜以淸燥之劑治之名之曰清暑益氣湯主之清暑益氣湯黃耆汗少者洗五分蒼术泔浸去皮已上各一錢五分升麻一錢人參去蘆白术橘皮神麯炒澤瀉已上各五分井草炙黃蘖酒浸當歸身麥門冬去心青皮去白葛根已上各三分五味子九箇內經云陽氣者衛外而為固也炅則氣泄今暑邪干衛故身熱自汗以黃耆人參井草補中益氣為君井草橘皮當歸身井辛微溫養胃氣和血脉為臣蒼术白术澤瀉滲利除濕升麻葛根苦井平善解肌熱又以風勝濕也濕勝則食不消而作痞滿故炒麯井辛青皮辛溫消食快氣腎惡燥急食辛以潤之故以黃蘖苦辛寒借井味瀉熱補水虛者滋其化源以五味子麥門冬酸井微寒救天暑之傷庚金為佐也右㕮咀作一服水二盞煎至一盞去柤熱服食逺此病皆因飲食失節勞倦所傷日漸因循損其脾胃乘暑天而作病也如汗大泄者津脫也急止之加五味子十枚炒黃蘖五分知母三分此按而收之也如濕熱乘其腎肝行步不正腳膝痿弱兩足欹側已中痿邪加酒洗黃蘖知母已上各五分令兩足湧出氣力矣如大便澀滯隔一二日不見者致食少乃血中伏火而不得潤也加當歸身生地黃已上各五分桃仁泥已上各一錢以潤之凡脾胃虛弱之人遇六七月霖雨諸物皆潤人汗沾衣身重短氣更逢濕旺助熱為邪西北二方寒清絶矣人重感之則骨乏無力其形如夢寐間朦朦如煙霧中不知身所有也聖人立法夏月宜補者補天真元氣非補熱火也夏食寒者是也故以人參之井補氣麥門冬苦寒瀉熱補水之源五味子之酸清肅燥金名曰生脉散孫真人云五月常服五味子以補五臟之氣亦此意也參术調中湯瀉熱補氣止嗽定喘和脾胃進飲食白术五分黃耆四分桑白皮井草炙人參已上各三分麥門冬去心靑皮去白陳皮去白地骨皮白茯苓已上各二分五味子二十箇內經云火位之主其瀉以井以黃耆井溫瀉熱補氣桑白皮苦微寒瀉肺火定喘故以為君肺欲收急食酸以收之以五味子之酸收耗散之氣止咳嗽脾胃不足以井補之故用白术人參炙井草苦井溫補脾緩中為臣地骨皮苦微寒善解肌熱茯苓井平降肺火麥門冬井微寒保肺氣為佐青皮陳皮去白苦辛溫散胸中滯氣為使也右件㕮咀如麻豆大都作一服水二盞煎至一盞去柤大溫服早飯後忌多語言勞役升陽散火湯治男子婦人四肢發困熱肌熱筋骨間熱表熱如火燎於肌膚捫之烙手夫四肢屬脾脾者土也熱伏地中此病多因血虛而得之也又有胃過食冷物鬱遏陽氣於脾土之中並宜服之升麻葛根獨活羌活白芍藥人參已上各五錢井草炙柴胡已上各三錢防風井草生二錢右件㕮咀如麻豆大每服稱五錢水二盞煎至一盞去柤大溫服無時忌寒冷之物當歸補血湯治肌熱燥熱困渴引飲目赤面紅晝夜息其脉洪大而虛重按全無內經曰脉虛血虛又云血虛發熱證象白虎惟脉不長實為辨耳誤服白虎湯必死此病得之於肌困勞役黃耆一兩炙當歸酒洗二錢右件㕮咀都作一服水二盞煎至一盞去柤溫服空心食前硃砂涼膈丸治上焦虛熱肺脘咽膈有氣如煙搶上黃連山梔子已上各一兩人參茯苓已上各五錢硃砂三錢别研腦子五分别研右為細末研勻煉蜜為丸如梧桐子大硃砂為衣熟水送下五七九日進三服食後黃連清膈丸治心肺間有熱及經中熱麥門冬去心一兩黃連去蘆五錢鼠尾黃芩净刮三錢右為細末煉蜜為丸如菉豆大每服二十丸溫水送下食後門冬清肺飲治脾胃虛弱氣促氣弱精神短少衄血吐血紫菀茸一錢五分黃耆白芍藥井草已上各一錢人參去蘆麥門冬已上各五分當歸身三分五味子三箇右㕮咀分作二服每服水二盞煎至一盞去柤溫服食後局方中大阿膠丸亦宜用人參清鎮丸治熱上嗽消痰定喘柴胡人參已上各一兩五錢生黃芩半夏井草炙已上各七錢二分青黛六錢天門冬去心三錢陳皮去白五味子去核一錢右件為細末水糊為丸如梧桐子大每服三十丸至五十丸溫白湯送下食後局方中人參清肺湯亦宜用皂角化痰丸治勞風心脾壅滯痰涎甚多喉中不利涕唾稠粘嗌塞吐逆不思飲食或時昏憒皂角木白皮酥炙白附子炮半夏湯洗七次天南星炮白礬枯赤茯苓去皮人參已上各一兩枳殼炒一兩右為細末生薑汁麵糊為丸如梧桐子大每服三十丸溫水送下食後白术和胃丸治病久厭厭不能食而臟腑或結或溏此胃氣虛弱也常服則和中理氣消痰去濕和脾胃進飲食白术一兩二錢半夏湯洗七次厚朴薑製已上各一兩陳皮去白八錢人參九錢井草炙三錢枳實麩炒檳榔已上各一錢五分木香一錢右件為細末生薑汁浸蒸餅為丸如梧桐子大每服三十丸溫水送下食逺肺之脾胃虛方脾胃虛則怠惰嗜卧四肢不收時值秋燥令行濕熱少退體重節痛口乾舌乾飲食無味大便不調小便頻數不欲食食不消兼見肺病灑淅惡寒慘慘不樂而色惡而不和乃陽氣不伸故也當升陽益氣名之曰升陽益胃湯升陽益胃湯黃耆二兩半夏洗此一味脉澀者用人參去蘆井草炙已上各一兩獨活防風以秋旺故以辛溫弱之白芍藥何故秋旺用人參白术芍藥之類反補肺為脾胃虛則肺受邪故因時而補易為力也羌活已上各五錢橘皮四錢茯苓小便利不渴者勿用柴胡澤瀉不淋勿用白术已上各三錢黃連一錢右㕮咀每服稱三錢水三盞生薑五片棗二枚煎至一盞去柤溫服早飯後或加至五錢服藥後如小便罷而病加增劇是不宜利小便當少去茯苓澤瀉若喜食一二日不可飽食恐胃再傷以藥力尚少胃氣不得轉運升發也須滋味之食或美食助其藥力益升浮之氣而滋其胃氣慎不可淡食以損藥力而助邪氣之降沈也可以小役形體使胃與藥得轉運升發慎勿大勞役使氣復傷若脾胃得安靜尤佳若胃氣稍强少食果以助穀藥之力經云五穀為養五果為助者也雙和散補血益氣治虛勞少力白芍藥二兩五錢黃耆熟地黃川芎當歸已上各一兩井草炙官桂已上各七錢五分右為粗末每服四錢水一盞半生薑三片棗二枚煎至七分去柤溫服大病之後虛勞氣乏者以此調治不熱不冷溫而有補寬中進食丸滋形氣喜飲食大麥蘖一兩半夏猪苓去黑皮已上各七錢草豆蔲仁神麯炒已上各五錢枳實麩炒四錢橘皮白术白茯苓澤瀉已上各二錢縮砂仁一錢五分乾生薑井草炙人參青皮已上各一錢木香五分右為細末湯浸蒸餅為丸如梧桐子大每服三十丸溫米飲送下食後厚朴溫中湯治脾胃虛寒心腹脹滿及秋冬客寒犯胃時作疼痛厚朴薑製橘皮去白已上各一錢井草炙草豆蔲仁茯苓去皮木香已上各五錢乾薑七分戊火已衰不能運化又加客寒聚為滿痛散以辛熱佐以苦井以淡泄之氣溫胃和痛自止矣右為粗散每服五錢水二盞生薑三片煎至一盞去柤溫服食前忌一切冷物腎之脾胃虛方沉香溫胃丸治中焦氣弱脾胃受寒飲食不美氣不調和臟腑積冷心腹疼痛大便滑泄腹中雷鳴霍亂吐瀉手足厥逆便痢無度又治下熱陽虛臍腹冷痛及療傷寒隂濕形氣沈困自汗附子泡去皮臍巴㦸酒浸去心乾薑炮茴香炮已上各一兩官桂七錢沉香井草炙當歸吳茱茰洗炒去蘆人參白术白芍藥白茯苓去皮良薑木香已上各五錢丁香三錢右為細末用好醋打麵糊為丸如梧桐子大每服五七十丸熱米飲送下空心食前日進三服忌一切生冷物凡脾胃之證調治差誤或妄下之末傳寒中復遇時寒則四肢厥逆而心胃絞痛冷汗出舉痛論云寒氣客於五臟厥逆上泄隂氣竭陽氣未入故卒然痛死不知人氣復則生矣夫六氣之勝皆能為病惟寒毒最重隂主殺故也聖人以辛熱散之復其陽氣故曰寒邪客之得炅則痛立止此之謂也神聖復氣湯治復氣乘冬足太陽寒水足少隂腎水子能令母實手太隂肺實反來侮土木受邪腰背胸膈閉塞疼痛善嚏口中涎目中泣鼻流濁涕不止或息肉不聞香臭咳嗽痰沫上熱如火下寒如水頭作陳痛目中流火視物昏昏耳鳴耳聾頭并口鼻或惡風寒喜日陽夜卧不安常覺痰塞膈咽不通口失味兩脅縮急而痛牙齒動搖不能嚼物隂汗自出前隂冷行步欹側起居艱難掌中熱風痺麻木小便數而晝多夜頻而缺氣短喘喝少氣不足以息卒遺失無度婦人白帶隂户中大痛牽心而痛面如赭色食少大便不調心煩霍亂逆氣裏急而腹痛皮色白後出餘氣後不能弩或腸鳴膝下筋急肩脾大痛此寒水來復火土之讎也乾薑炮為末一錢三分柴胡銼如豆大羌活銼已上各一錢井草銼藁本已上各八分升麻銼半夏湯浸已上各七分當歸身酒浸銼六分防風銼如豆大郁李仁湯浸去皮研如泥入藥同煎人參已上各五分附子炮去皮臍二分白葵花五朵去心細剪入右件藥都作一服水五盞煎至二盞入草豆蔲仁麵褁燒麵熟去皮乾黃耆已上各一錢橘皮五分在內再煎至一盞再入下項藥枳殼五分黃蘖酒浸黃連酒洗已上各三分生地黃湯洗二分已上四味預一日另用新水浸又以川芎細末蔓荆子已上各三分華細辛二分預一日用新水半大盞分作二處浸此三味并黃蘖等煎正藥作一大盞去柤稍熱服空心又能治齒頰嚙唇齒舌根强硬等證如神宜食羊肉及厚滋味大抵腎併膀胱經中有寒元氣不足者皆宜服之神驗於月生月滿時隔三五日一服如病急不拘時分服治法已試驗者學者當以意求其的觸類而長之則不可勝用矣豫病肺胃久衰視聽半失此隂乘陽而上氣短精神不足且脉弦皆陽氣衰弱伏匿於隂中故耳癸卯歲六七月間霖雨隂寒踰月不止時人多病瀉痢乃濕多成五泄故也一日體重肢節疼痛大便泄併下者三而小便閉塞默思內經有云在下者引而竭之是先利小便也又治諸瀉而小便不利者先分利之又云治濕不利小便非其治也法當利其小便必用淡滲之劑利之病雖即已是降之又降復益其隂而重竭其陽也則陽氣愈削而精神愈短矣隂重强而陽重衰也兹以升陽之藥是為宜耳羌活獨活升麻各一錢防風半錢炙井草半錢同㕮咀水四盞煎至一盞去柤熱服一服乃愈大法云寒濕之勝助風以平之又曰下者舉之此得陽氣升騰故愈是因曲而為之直也夫聖人之法可以類推舉一則可以知百矣內外傷辨惑論卷中
