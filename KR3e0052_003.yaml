body:
  text: 內外傷辨惑論卷下元李杲撰辨內傷飲食用藥所宜所禁夫傷飲食付藥者受藥者皆以為瑣末細事是以所當重者為輕利害非細殊不思胃氣者榮氣也衛氣也穀氣也清氣也資少陽生發之氣也人之真氣衰旺皆在飲食入胃胃和則穀氣上升穀氣者升騰之氣也乃足少陽膽手少陽元氣始發生長萬化之别名也飲食一傷若消𨗳藥的對其所傷之物則胃氣愈旺五穀之精華上出乃清氣為天者也精氣神氣皆強盛七神衛護生氣不乏增益大旺氣血周流則百病不能侵雖有大風竒毒弗能害也此一藥通用其利博哉易水張先生嘗戒不可用峻利食藥食藥下咽未至藥丸施化其標皮之力始開便言空快也所傷之物已去若更待一兩時辰許藥盡化開其峻利藥必有情性病去之後脾胃安得不損乎脾胃既損是真氣元氣敗壞促人之壽當時説下一藥枳實一兩麩炒黃色為度白术二兩只此二味荷葉裹燒飯為丸以白术苦井溫其井溫補脾胃之元氣其苦味除胃中之濕熱利腰臍間血故先補脾胃之弱過於枳實尅化之藥一倍枳實味苦寒泄心下痞悶消化胃中所傷不能即去須待一兩時辰許食則消化是先補其虛而後化其所傷則不峻利矣當是之時未悟用荷葉燒飯為丸之理老年味之始得可謂神竒矣荷葉之一物中央空虛象震卦之體震者動也人感之生足少陽甲膽也甲膽者風也生化萬物之損蒂也左傳云履端於始序則不愆人之飲食入胃營氣上行即少陽甲膽之氣也其手少陽三焦經人之元氣也手足經同法便是少陽元氣生發也胃氣元氣穀氣甲膽上升之氣一也異名雖多止是胃氣上升者也荷葉之體生於水上其下出於穢汙之中而不為穢汙所染挺然獨立其色青形乃空淸而象風木者也食藥感此氣之化胃氣何由不上升乎其主意用此一味為引用可謂逺識深慮合於道者也更以燒飯和藥與白术協力滋養穀氣而補令胃厚再不至內傷其利廣矣大矣若內傷脾胃以辛熱之物酒肉之類自覺不快覔藥於醫者此風習以為常醫者亦不問所傷即付之以集香丸巴豆大熱藥之類下之大便下則物去遺留食之熱性藥之熱性重傷元氣七神不熾經云熱傷氣正謂此也其人必無氣以動而熱困四肢不舉傳變諸疾不可勝數使人真氣自此衰矣若傷生冷硬物世醫或用大黃牽牛二味大寒藥投之物隨藥下所傷去矣遺留食之寒性藥之寒性重瀉其陽陽去則皮膚筋骨肉血脈無所依倚便為虛損之證論言及此令人寒心夫辛辣氣薄之藥無故不可亂服非止牽牛而已至真要大論云五味入胃各先逐其所喜攻攻者尅伐瀉也辛味下咽先攻瀉肺之五氣氣者真氣元氣也其牽牛之辛辣猛烈奪人尤甚飲食所傷腸胃受邪當以苦味瀉其腸胃可也肺與元氣何罪之有牽牛不可用者有五此其一也況胃主血為物所傷物者有形之物也皆是血病血病瀉氣此其二也且飲食傷於中焦止合尅化消𨗳其食重瀉上焦脈中已虛之氣此其三也食傷腸胃當塞因塞用又寒因寒用枳實大黃苦寒之物以瀉有形是也反以辛辣牽牛散瀉真氣犯大禁四也殊不知針經第一卷第一篇有云外來客邪風寒傷人五臟若誤瀉胃氣必死誤補亦死其死也無氣以動故靜若內傷腸胃而反瀉五臟必死誤補亦死其死也隂氣有餘故躁今內傷腸胃是謂六腑不足之病反瀉上焦虛無肺氣肺者五臟之一數也為牽牛之類朝損暮損其元氣消耗此乃暗裏折人夀數犯大禁五也良可哀歎故特著此論并方庶令四海聞而行之不致夭橫耳此老夫之用心也胃氣豈可不養復明養胃調理故經曰安穀則昌絶穀則亡水去則榮散榖消則衛亡榮散衛亡神無所依仲景云榮入於經其血乃成穀入於胃脈道乃行故胃不可不養胃不可不溫血溫胃和榮衛將行常有天命穀者身之大柄也書與周禮皆曰水火金木土穀惟修以奉養五臟者也內傷飲食固非細事茍妄服食藥而輕生殞命其可乎哉黃帝針經有説胃惡熱而喜清大腸惡淸冷而喜熱兩者不和何以調之岐伯曰調此者飲食衣服亦欲適寒溫使寒無悽愴暑無出汗飲食者熱無灼灼寒無滄滄寒溫中適故氣將持乃不致邪僻也詳説見於本經條下是必有因用豈可用俱寒俱熱之食藥致損者與內經云內傷者其氣口脈反大於人迎一倍二倍三倍分經用藥又曰上部有脈下部無脈其人當吐不吐者死如但食不納惡心欲吐者不問一倍二倍不當止與瓜蒂散吐之但以指或以物探去之若所傷之物去不盡者更診其脈問其所傷以食藥去之以應塞因塞用又謂之寒因寒用泄而下降乃應太隂之用其中更加升發之藥令其元氣上升塞因塞用因曲而為之直何為曲內傷胃氣是也因治其飲食之內傷而使生氣增益胃氣完復此乃因曲而為之直也若依分經用藥其所傷之物寒熱溫涼生硬柔軟所傷不一難立定法只隨所傷之物不同各立治法臨時加減用之其用藥又須問病人從來稟氣盛衰所傷寒物熱物是喜食而食之邪不可服破氣藥若乘飢困而食之耶當益胃氣或為人所勉勸強食之宜損血而益氣也診其脈候傷在何臟方可與對病之藥豈可妄損大真生氣以輕喪身寶乎且如先食熱物則不傷繼之以寒物因後食致前食亦不消化而傷者當問熱食寒食孰多孰少斟酌與藥無不當矣喻如傷熱物二分寒物一分則當用寒藥二分熱藥一分和合而與之則榮衛之氣必得周流更有或先飲酒而後傷寒冷之食及傷熱食冷水與氷如此不等皆當驗其節次所傷之物約量寒熱之劑分數各各對證而與之無不取驗自忖所定方藥未敢便為能盡藥性之理姑用指迷辨惑耳隨證立方備陳于后張先生枳术丸治痞消食強胃白术二兩枳實麩炒黃色去穰一兩右同為極細末荷葉裹燒飯為丸如梧桐子大每服五十丸白湯下無時白术者本意不取其食速化但久令人胃氣強實不復傷也橘皮枳术丸治老幼元氣虛弱飲食不消或臟腑不調心下痞悶橘皮枳實麩炒去穰已上各一兩白术二兩右件為細末荷葉燒飯為丸如梧桐子大每服五十丸熟水送下食逺夫內傷用藥之大法所貴服之強人胃氣令胃氣益厚雖猛食多食重食而不傷此能用食藥者也此藥久久益胃氣令人不復致傷也麴蘖枳术丸治為食所勉勸強食之致心腹滿悶不快枳實麩炒去穰大麥蘖麩炒神麯炒已上各一兩白术二兩右為細末荷葉燒飯為丸如梧桐子大每服五十丸用溫水下食逺木香枳术丸破滯氣消飲食開胃進食木香枳實麩炒去穰已上各一兩白术二兩右為細末荷葉燒飯為丸如梧桐子大每服五十丸溫水送下食逺木香化滯湯治因憂氣食濕麵結於中脘腹皮底微痛心下痞滿不思飲食食之不散常常痞氣半夏一兩草豆蔲仁井草炙已上各五錢柴胡四錢木香橘皮已上各三錢枳實麩炒去穰當歸梢已上各二錢紅花五分右件銼如麻豆大每服五錢水二大盞生薑五片煎至一盞去柤稍熱服食逺忌酒濕麵半夏枳术丸治因冷食內傷半夏湯洗七次焙乾枳實麩炒已上各一兩白术二兩右同為極細末荷葉燒飯為丸如菉豆大每服五十丸溫水送下添服不妨熱湯浸蒸餅為丸亦可如食傷寒熱不調每服加上二黃丸十丸白湯送下更作一方加澤瀉一兩為丸有小便淋者丁香爛飯丸治飯食所傷丁香京三稜廣茂炮木香已上各一錢井草炙井松去上縮砂仁丁香皮益智仁已上各三錢香附子五錢右為細末湯浸蒸餅為丸如菉豆大每服三十丸白湯送下或細嚼亦可不拘時候治卒心胃痛甚效草豆蔲丸治秋冬傷寒冷物胃脘當心而痛上支兩脅膈咽不通草豆蔲麩褁煨去皮取仁枳實麩炒黃色白术已上各二兩大麥蘖麩炒黃色半夏湯洗七次日乾黃芩刮去皮生神麯炒黃色已上各五錢乾生薑橘皮青皮已上各二錢炒鹽五分右為極細末湯浸蒸餅為丸如菉豆大每服五十丸白湯下量所傷多少加減服之如冬月用别作一藥不用黃芩歲火不及又傷冷物加以溫劑是其治也然有熱物傷者從權以寒藥治之宜不可不知也三黃枳术丸治傷肉食濕麵辛辣味厚之物填塞悶亂不快黃芩二兩黃連酒洗大黃濕褁煨神麴炒橘皮白术已上各一兩枳實麩炒五錢右為細末湯浸蒸餅為丸如菉豆大一倍每服五十丸白湯送下量所傷服之除濕益氣丸治傷濕麵心腹滿悶肢體沈重枳實麩炒黃色神麯炒黃色黃芩生用白术已上各一兩蘿蔔子炒熱去穢氣五錢紅花三分各一錢分十也右同為極細末荷葉裹燒飯為丸如菉豆大每服五十丸白湯送下量所傷多少服之上二黃丸治傷熱食痞悶兀兀欲吐煩亂不安黃芩二兩黃連去鬚酒浸一兩升麻柴胡已上各二錢井草二錢一方加枳實麩炒去穰五錢右為極細末湯浸蒸餅為丸如菉豆大每服五七十丸白湯送下量所傷服之枳實𨗳滯丸治傷濕熱之物不得施化而作痞滿悶亂不安大黃一兩枳實麩炒去穰神麯炒已上各五錢茯苓去皮黃芩去腐黃連揀淨白术已上各三錢澤瀉二錢右件為細末湯浸蒸餅為丸如梧桐子大每服五十丸至七十丸溫水送下食逺量虛實加減服之枳實梔子大黃湯治大病差後傷食勞復枳實一兩麩炒去穰梔子三枚半肥者豆豉一兩二錢五分綿褁右以清漿水二盞空煮退八分內枳實梔子煮取八分下豉再煮五六沸去柤溫服覆令汗出若有宿食內太黃如薄碁子五六枚同煎食膏粱之物過多煩熱悶亂者亦宜服之白术丸治濕豆粉濕麵油膩之物枳實麩炒黃一兩一錢白术半夏湯浸神麯炒黃已上各一兩橘皮去穰七錢黃芩五錢白礬枯三分右為極細末湯浸蒸餅為丸如菉豆一倍大每服五十丸白湯送下量所傷加減服素食多用乾薑故加黃芩以瀉之木香見睍丸治傷生冷硬物心腹滿悶疼痛神麴炒黃色京三稜煨已上各一兩石三稜去皮煨草豆蔲麵褁煨熟取香附子炒香已上各五錢升麻柴胡已上各三分木香二錢巴豆霜五分右為細末湯浸蒸餅為丸如菉豆一倍大每服三十丸溫白湯下量所傷多少服之三稜消積丸治傷生冷硬物不能消化心腹滿悶京三稜炮廣茂炒炒麴已上各七錢青橘皮巴豆和皮米炒黑焦去米茴香炒陳橘皮已上各五錢丁皮益智已上各三錢右件為細末醋打麵糊為丸如梧桐子大每服十丸加至二十丸溫生薑湯送下食前量虛實加減如更衣止後服之備急大黃丸療心腹諸卒暴百病大黃巴豆去皮乾薑已上各一兩右須要精新好藥搗羅蜜和更搗一千杵丸如小豆大每服三丸老少量之若中惡客忤心腹脹滿卒痛如刀錐刺痛氣急口噤停尸卒死者以暖水苦酒服之或不下捧頭起令下咽須臾差輕更與三丸以腹中鳴轉即吐下便愈若口已噤亦須折齒灌之令入尤妙忌蘆筍豬肉冷水肥膩之物易水張先生又名獨行丸乃急劑也神應丸治因一切冷物冷水及潼乳酪水腹痛腸鳴水穀不化黃蠟二兩巴豆杏仁百草霜乾薑已上各五錢丁香木香右先將黃蠟用好醋煮去柤穢將巴豆杏仁同炒黑煙盡研如泥將黃蠟再上火入小油半兩溶開入在杏仁巴豆泥子內同攪旋下丁香木香等藥末研勻搓作挺子油紙裹了旋丸用每服三五十丸溫米飲送下食前日進三服如脈緩體重自利乃濕氣勝也以五苓散平胃散加炒麴相合而服之名之曰對金飲子益胃散治服寒藥過多或脾胃虛弱胃脘痛陳皮黃耆已上各七錢益智仁六錢白豆蔲仁澤瀉乾生薑薑黃已上各三錢縮砂仁井草厚朴人參已上各二錢右為細末每服三錢水一盞煎至七分溫服食前如脈弦惡寒腹痛乃中氣弱也以仲景小建中湯加黃耆錢氏異攻散加芍藥選而用之如渴甚者以白术散加葛根倍之飲食自倍腸胃乃傷分而治之痺論云隂氣者靜則神藏躁則消亡飲食自倍乃傷此混言之也分之為二飲也食也又經云因而大飲則氣逆因而飽食筋脈橫解則腸澼為痔飲者無形之氣傷之則宜發汗利小便使上下分消其濕解酲湯五苓散之類主之食者有形之物傷之則宜損其穀其次莫若消𨗳丁香爛飯丸枳术丸之類主之稍重則攻化三稜消積丸木香見睍丸之類主之以平為期蓋脾已傷叉以藥傷使營運之氣減削食愈難消故五常政論云大毒治病十去其六常毒治病十去其九小毒治病十去其八無毒治病十去其九穀肉果菜食養盡之無使過之傷其正也不盡行復如法聖人垂此嚴戒是為萬世福也如能慎言語節飲食所謂治未病也論酒客病夫酒者大熱有毒氣味俱陽乃無形之物也若傷之止當發散汗出則愈矣此最妙法也其次莫如利小便二者乃上下分消其濕何酒病之有今之酒病者往往服酒癥丸大熱之藥下之又有用牽牛大黃下之者是無形元氣受病反下有形隂血乖誤甚矣酒性大熱已傷元氣而復重瀉之況亦損腎水真隂及有形隂血俱為不足如此則隂血愈虛真水愈弱陽毒之熱大旺反增其隂火是謂元氣消亡七神何依折人長命不然則虛損之病成矣金匱要略云酒疸下之久則為黑疸慎不可犯此戒不若令上下分消其濕葛花解酲湯主之葛花解酲湯白豆蔲仁縮砂仁葛花已上各五錢乾生薑神麯炒黃澤瀉白术已上各二錢橘皮去白豬苓去皮人參去蘆白茯苓已上各一錢五分木香五分蓮花青皮去穰三分右為極細末稱和勻每服三錢七白湯調下但得微汗酒病去矣此蓋不得已而用之豈可恃賴日日飲酒此藥氣味辛辣偶因酒病服之則不損元氣何者敵酒病故也若頻服之損人天年除濕散治傷馬亂并牛羊酪水一切冷物神麯炒黃一兩茯苓七錢車前子炒香澤瀉已上各五錢半夏湯洗乾生薑已上各三錢井草炙紅花已上各二錢右同為極細末每服三錢七白湯調下食前五苓散治傷寒溫熱病表裏未解頭痛發熱口燥咽乾煩渴飲水或水入即吐或小便不利及汗出表解煩渴不止者宜服之又治霍亂吐利燥渴引飲之證澤瀉二兩五錢豬苓茯苓白术已上各一兩五錢桂一兩右為細末每服二錢熱湯調服不計時候服訖多飲熱湯有汗出即愈又治瘀熱在裏身熱黃疸濃煎茵蔯蒿湯調下食前服之如疸發渴及中暑引飲亦可用水調服之臨病制方至真要論云濕淫所勝治以苦溫佐以井辛以汗為度而止以淡泄之得其法者分輕重而制方金匱要略云腰已上腫者發汗乃愈腰已下腫者當利小便由是大病差後腰已下有水氣者牡蠣澤瀉散主之又云治濕不利小便非其治也制五苓散以利之孫真人療膚革腫以五皮散乃比類象形之故也水熱穴論云上為喘呼下為腫滿不得卧者標本俱病制神袐湯以去之活人書云均是水氣乾嘔微痢發熱而咳為表有水小青龍湯加芫花主之身體涼表證罷咳兩脅下痛為裏有水十棗湯主之亦是仲景方也易水張先生云仲景藥為萬世法號羣方之祖治雜病若神後之醫者宗內經法學仲景心可以為師矣隨時用藥治傷冷飲者以五苓散每服三錢或四錢匕加生薑煎服之治傷食兼傷冷飲者煎五苓散送下半夏枳术丸服之治傷冷飲不惡寒者服中亦不覺寒惟覺夯悶身重飲食不化者或小便不利煎去桂五苓散依前斟酌服之假令所傷前後不同以三分為率熱物二分傷生冷硬物一分用寒藥三黃丸二停用熱藥木香見睍丸一停合而服之又如傷生冷物二分傷熱物一分用熱木香見睍丸二停用寒藥二黃丸一停合而服之假令夏月大熱之時傷生冷硬物當用熱藥木香見睍丸治之須少加三黃丸謂天時不可伐故加寒藥以順時令若傷熱物只用三黃丸可謂此三黃丸時藥也假令冬天大寒之時傷羊肉濕麵等熱物當用三黃丸治之須加熱藥少許草豆蔲丸之類是也為引用又為時藥經云必先歲氣無伐天和此之謂也餘皆倣此吐法宜用辨上部有脈下部無脈上部有脈下部無脈其人當吐不吐者死何謂也下部無脈此所謂木鬱也飽食過飽填塞胸中胸中者太隂之分野經云氣口反大於人迎三倍食傷太隂故曰木鬱則逹之吐者是也瓜蒂散瓜蒂赤小豆右二味為極細末每服一錢七溫漿水調下取吐為度若不兩手尸脈絶無不宜便用此藥恐損元氣令人胃氣不復若止是胸中窒塞悶亂不通以指探去之如不得吐者以物探去之得吐則已如食不去用此藥去之解云盛食填塞於胸中為之窒塞兩手寸脈當主事兩尺脈不見其理安在胸中有食故以吐出之食者物也物者坤土也是足太隂之號也胸中者肺也為物所填肺者手太隂金也金主殺伐也與坤土俱在於上而旺於天金能尅木故肝木生發之氣伏於地下非木鬱而何吐去上焦隂土之物木得舒暢則鬱結去矣食塞於上脈絶於下若不明天地之道無由逹此至理水火者隂陽之徵兆天地之别名也故曰獨陽不生獨隂不長天之用在於地下則萬物生長矣地之用在於天上則萬物收藏矣此乃天地交而萬物通也此天地相根之道也故陽火之根本於地下隂水之源本於天上故曰水出髙源故人五臟主有形之物物者隂也隂者水也右三部脈主之遍見於寸口食塞其上是絶五臟之源源絶則水不下流兩足竭絶此其理也何疑之有重明木鬱則逹之之理或曰食盛填塞於胸中為之窒塞也令吐以去其所傷之物物去則安胸中者大隂肺之分野木鬱者遏於厥隂肝木於下故以吐伸之以舒陽和風木之氣也此吐乃瀉出太隂之塞何謂木鬱請聞其説答曰此大神靈之問非演説大道不能及於此天地之間六合之內惟水與火耳火者陽也升浮之象也在天為體在地為用水者隂土也降沈之象也在地為體在天為殞殺收藏之用也其氣上下交則以成八卦矣以醫書言之則是升浮降沈溫涼寒熱四時也以應八卦若天火在上地水在下則是天地不交隂陽不相輔也是萬物之道大易之理絶減矣故經言獨陽不生獨隂不長天地隂陽何交會矣故曰陽本根於隂隂本根於陽若不明根源是不明道故六陽之氣生於地則曰陽本根於隂以人身言之是六腑之氣生發長散於胃土之中也既陽氣鼓舞萬象有形質之物於人為浮散者也隂極必反陽極變隂既六陽升浮之力在天其力盡是陽道終矣所以鼓舞六隂有形之隂水在天在外也上六無位必歸於下此老陽變隂之象也是五臟之源在於天者也天者人之肺以應之故曰隂本源於陽水出髙源者是也人之五臟其源在於肺者背也背在天也故足太陽膀胱寒生長其源在申故隂寒自此而降以成秋收氣寒之漸也降至於地下以成冬藏伏諸六陽在九泉之下者也故五臟之氣生於天以人身是五臟之氣收降藏沈之源出於肺氣之上其流下行沈墜萬化有形質之物皆收藏於地為降沈者也物極必反隂極變陽既六隂降沈之力在地其力既盡是隂道終矣是老隂變陽反初九無位是一歲四時之氣終而復始為上下者也莫知其紀如環無端且大隂者肺金收降之氣當居下體今反在於上抑遏厥隂風木反居於下是不得上升也故曰木鬱故令其吐出窒塞有形土化之物使太隂秋肺收於下體復其本以衰之始上升手足厥隂之木元氣以伸其舒暢上升之志得其所矣又况金能尅木以吐伐之則金衰矣金者其道當降是塞因塞用歸其本矣居於上則遏其木故以吐伸之使瀉金以助木也遍考內經中所説木鬱則逹之之義止是食傷太隂有形之物窒塞於胸中尅制厥隂木氣伏潛於下不得舒伸於上止此耳别無異説以六淫有餘運氣中論之仲景傷寒論云懊憹煩躁不得眠不經汗下謂之實煩瓜蒂散主之曾經妄汗妄吐妄下謂之虛煩者梔子豉湯主之老夫欲令醫者治隂陽之證補瀉不至錯誤病家雖不知醫明曉所得之病當補當瀉之法將黃帝針經第一卷第五篇説形氣有餘不足當補當瀉之理録之於前豫自注者附之黃帝曰形氣之逆順奈何岐伯答曰形氣不足病氣有餘是邪勝也急當瀉之形氣有餘病氣不足急當補之形氣不足病氣不足此隂陽俱不足也不可刺之刺之重不足重不足則隂陽俱竭血氣皆盡五臟皆枯筋骨髓枯老者絶滅壯者不復矣形氣有餘病氣有餘此謂隂陽俱有餘也急瀉其邪調其虛實故曰有餘者瀉之不足者補之此之謂也經曰刺不知逆順真邪相傳滿者補之則隂陽四溢腸胃充廓肝肺內填隂陽相錯虛而瀉之則經脈空虛血氣枯竭腸胃㒤辟皮膚薄著毛腠夭樵子之死期故曰用針之要在於知調隂與陽調隂與陽精氣乃光合形與氣使神內藏故曰上工平氣中工亂脈下工絶氣危生故曰下工不可不慎也必審五臟變化之病五脈之應經絡之實虛皮膚之柔粗而後取之也聖人垂慈之心已詳矣不合立言老夫誠恐市井莊農山野間人不知文理故以俚語開解之云但病來潮作之時病氣精神增添者是為病氣有餘乃邪氣勝也急瀉之以寒涼酸苦之劑若病來潮作之時神氣困弱者為病氣不足乃真氣不足也急補之以辛井溫熱之劑不問形氣有餘并形氣不足只取病氣有餘不足也不足者補之有餘者瀉之假令病氣有餘者當急瀉之以寒涼之劑為邪氣勝也病氣不足者當急補之以辛井溫熱之劑此真氣充足也夫形氣者氣謂口鼻出氣息也形謂皮肉筋骨血脈也形勝者為有餘消瘦者為不足其氣者審口鼻中氣勞役如故為氣有餘也若喘息氣促氣短或不足以息者為不足也故曰形氣也乃人之身形中氣血也當補當瀉全不在於此只在病勢潮作之時病氣有餘者是邪氣勝也急當瀉之如潮作之時精神困弱語言無力及潮語者是真氣不足也急當補之若病人形氣不足病來潮作之時病氣亦不足是乃隂陽俱不足也禁用針宜補之以其藥不可以盡劑不炙弗已臍下一寸五分氣海穴是也凡用藥若不本四時以順為逆四時者是春升夏浮秋降冬沈乃天地之升浮化降沈化者脾土中造化也是為四時之宜也但言補之以辛井溫熱之劑及味之薄者諸風藥是也此助春夏之升浮者也此便是瀉秋收冬藏之藥也在人之身乃肝心也但言瀉之以酸苦寒涼之劑并淡味滲泄之藥此助秋冬之降沈者也在人之身是肺腎也用藥者宜用此法度慎毋忽焉內外傷辨惑論卷下
